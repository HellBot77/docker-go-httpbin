on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  PLATFORM: linux/arm/v7
  DOCKERHUB_USERNAME: helllord

jobs:
  get-tag:
    runs-on: ubuntu-latest
    outputs:
      latest-tag: ${{ steps.get-tag.outputs.latest-tag }}
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3
      - name: Get Docker image tag
        id: get-tag
        run: python get_tag.py ${{ env.DOCKERHUB_USERNAME }}/go-httpbin --go github.com/mccutchen/go-httpbin/v2 >> $GITHUB_OUTPUT
  deploy:
    needs: get-tag
    if: ${{ needs.get-tag.outputs.latest-tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORM }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/go-httpbin:latest
            ${{ env.DOCKERHUB_USERNAME }}/go-httpbin:${{ needs.get-tag.outputs.latest-tag }}
